volumes:
  instarchiver_local_postgres_data: {}
  instarchiver_local_postgres_data_backups: {}
  instarchiver_local_redis_data: {}

services:
  django: &django
    build:
      context: .
      dockerfile: ./compose/local/django/Dockerfile
    image: instarchiver_local_django
    container_name: instarchiver_local_django
    depends_on:
      - postgres
      - redis
      - mailpit
      - pgbouncer
    volumes:
      - .:/app:z
    env_file:
      - ./.envs/.local/.django
      - ./.envs/.local/.postgres
    environment:
      PGBOUNCER_HOST: pgbouncer
      PGBOUNCER_PORT: "5432"
    ports:
      - '8000:8000'
    command: /start

  postgres:
    build:
      context: .
      dockerfile: ./compose/production/postgres/Dockerfile
    image: instarchiver_production_postgres
    container_name: instarchiver_local_postgres
    volumes:
      - instarchiver_local_postgres_data:/var/lib/postgresql/data
      - instarchiver_local_postgres_data_backups:/backups
    env_file:
      - ./.envs/.local/.postgres
    # ports:
    #   - '54321:5432'

  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    env_file:
      - ./.envs/.local/.postgres
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: 20
      MAX_CLIENT_CONN: 200
      AUTH_TYPE: scram-sha-256
      # MIN_POOL_SIZE: 5       # optional
      # RESERVE_POOL_SIZE: 5   # optional
    ports:
      - "5432:5432"
    depends_on:
      - postgres

  mailpit:
    image: docker.io/axllent/mailpit:latest
    container_name: instarchiver_local_mailpit
    ports:
      - "8025:8025"

  redis:
    image: docker.io/redis:6
    container_name: instarchiver_local_redis
    volumes:
      - instarchiver_local_redis_data:/data

  celeryworker:
    <<: *django
    image: instarchiver_local_celeryworker
    container_name: instarchiver_local_celeryworker
    depends_on:
      - redis
      - postgres
      - mailpit
      - pgbouncer
    ports: []
    command: /start-celeryworker

  celerybeat:
    <<: *django
    image: instarchiver_local_celerybeat
    container_name: instarchiver_local_celerybeat
    depends_on:
      - redis
      - postgres
      - mailpit
      - pgbouncer
    ports: []
    command: /start-celerybeat

  flower:
    <<: *django
    image: instarchiver_local_flower
    container_name: instarchiver_local_flower
    depends_on:
      - redis
      - postgres
      - mailpit
      - pgbouncer
    ports:
      - '5555:5555'
    command: /start-flower
