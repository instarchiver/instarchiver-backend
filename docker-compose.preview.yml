services:
  django:
    image: ghcr.io/${IMAGE_REPO}/django:pr-${PR_NUMBER}
    networks:
      - preview-internal
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.preview-pr${PR_NUMBER}.rule=Host(`${BRANCH_SLUG}.preview.instarchiver.net`)"
      - "traefik.http.routers.preview-pr${PR_NUMBER}.entrypoints=websecure"
      - "traefik.http.routers.preview-pr${PR_NUMBER}.tls.certresolver=cloudflare"
      - "traefik.http.services.preview-pr${PR_NUMBER}.loadbalancer.server.port=5000"
    env_file:
      - ${SHARED_ENV_DIR}/.django
      - .env
    command: /start
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: ghcr.io/${IMAGE_REPO}/postgres:pr-${PR_NUMBER}
    networks:
      - preview-internal
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - ${SHARED_ENV_DIR}/.postgres
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: docker.io/redis:6
    networks:
      - preview-internal

networks:
  preview-internal:
  traefik:
    external: true

volumes:
  postgres_data:
