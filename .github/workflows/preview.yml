name: Preview

on:
  # Deploy after CI passes on a pull request
  workflow_run:
    workflows: ["CI"]
    types: [completed]

  # Cleanup when PR is closed (merged or abandoned)
  pull_request:
    types: [closed]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ──────────────────────────────────────────────
  # Deploy preview after CI succeeds
  # ──────────────────────────────────────────────
  deploy:
    if: |
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: write

    steps:
      - name: Resolve PR number and branch slug
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="${{ github.event.workflow_run.head_branch }}"

          # pull_requests array is populated for non-fork PRs
          PR_NUMBER="${{ github.event.workflow_run.pull_requests[0].number }}"

          # Fallback: query the GitHub API
          if [ -z "$PR_NUMBER" ]; then
            PR_NUMBER=$(gh api "repos/${{ github.repository }}/pulls" \
              --jq ".[] | select(.head.ref == \"$BRANCH_NAME\" and .state == \"open\") | .number" \
              | head -1)
          fi

          if [ -z "$PR_NUMBER" ]; then
            echo "No open PR found for branch '$BRANCH_NAME' — skipping preview deploy"
            exit 1
          fi

          # DNS label: lowercase, only [a-z0-9-], max 50 chars
          BRANCH_SLUG=$(echo "$BRANCH_NAME" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9-]/-/g' \
            | sed 's/--*/-/g' \
            | sed 's/^-//; s/-$//' \
            | cut -c1-50)

          echo "number=$PR_NUMBER"        >> "$GITHUB_OUTPUT"
          echo "branch_slug=$BRANCH_SLUG" >> "$GITHUB_OUTPUT"

      - name: Checkout PR commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push django image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./compose/production/django/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/django:pr-${{ steps.pr.outputs.number }}
          cache-from: type=gha,scope=django-cached-preview
          cache-to: type=gha,scope=django-cached-preview,mode=max

      - name: Build and push postgres image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./compose/production/postgres/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/postgres:pr-${{ steps.pr.outputs.number }}
          cache-from: type=gha,scope=postgres-cached-preview
          cache-to: type=gha,scope=postgres-cached-preview,mode=max

      - name: Create deploy directory and write .env on VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PREVIEW_SSH_HOST }}
          username: ${{ secrets.PREVIEW_SSH_USERNAME }}
          key: ${{ secrets.PREVIEW_SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            mkdir -p "${{ secrets.PREVIEW_DEPLOY_PATH }}/pr-${{ steps.pr.outputs.number }}"

            cat > "${{ secrets.PREVIEW_DEPLOY_PATH }}/pr-${{ steps.pr.outputs.number }}/.env" <<'EOF'
            # Routing — used in docker-compose.preview.yml label interpolation
            PR_NUMBER=${{ steps.pr.outputs.number }}
            BRANCH_SLUG=${{ steps.pr.outputs.branch_slug }}
            IMAGE_REPO=${{ github.repository }}

            # Django
            USE_DOCKER=yes
            DJANGO_SETTINGS_MODULE=config.settings.preview
            DJANGO_SECRET_KEY=${{ secrets.PREVIEW_DJANGO_SECRET_KEY }}
            DJANGO_ALLOWED_HOSTS=${{ steps.pr.outputs.branch_slug }}.testing.instarchiver.net
            DJANGO_ADMIN_URL=${{ secrets.PREVIEW_DJANGO_ADMIN_URL }}
            REDIS_URL=redis://redis:6379/0

            # PostgreSQL
            POSTGRES_HOST=postgres
            POSTGRES_PORT=5432
            POSTGRES_DB=instarchiver
            POSTGRES_USER=instarchiver
            POSTGRES_PASSWORD=${{ secrets.PREVIEW_POSTGRES_PASSWORD }}
            EOF

      - name: Copy docker-compose.preview.yml to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.PREVIEW_SSH_HOST }}
          username: ${{ secrets.PREVIEW_SSH_USERNAME }}
          key: ${{ secrets.PREVIEW_SSH_PRIVATE_KEY }}
          source: "docker-compose.preview.yml"
          target: "${{ secrets.PREVIEW_DEPLOY_PATH }}/pr-${{ steps.pr.outputs.number }}"
          overwrite: true

      - name: Start containers and run migrations
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PREVIEW_SSH_HOST }}
          username: ${{ secrets.PREVIEW_SSH_USERNAME }}
          key: ${{ secrets.PREVIEW_SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail

            COMPOSE_FILE="${{ secrets.PREVIEW_DEPLOY_PATH }}/pr-${{ steps.pr.outputs.number }}/docker-compose.preview.yml"

            docker compose -p "preview-pr${{ steps.pr.outputs.number }}" -f "$COMPOSE_FILE" \
              up -d --pull always --remove-orphans

            docker compose -p "preview-pr${{ steps.pr.outputs.number }}" -f "$COMPOSE_FILE" \
              exec -T django python manage.py migrate --noinput

      - name: Comment preview URL on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ steps.pr.outputs.number }}" \
            --repo "${{ github.repository }}" \
            --body "**Preview deployed** → https://${{ steps.pr.outputs.branch_slug }}.testing.instarchiver.net

          Built from \`${{ github.event.workflow_run.head_sha }}\`"

  # ──────────────────────────────────────────────
  # Tear down preview when PR is closed
  # ──────────────────────────────────────────────
  cleanup:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      packages: write
      pull-requests: write

    steps:
      - name: Compute branch slug
        id: slug
        run: |
          BRANCH_SLUG=$(echo "${{ github.head_ref }}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9-]/-/g' \
            | sed 's/--*/-/g' \
            | sed 's/^-//; s/-$//' \
            | cut -c1-50)
          echo "branch_slug=$BRANCH_SLUG" >> "$GITHUB_OUTPUT"

      - name: Tear down containers and volumes
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PREVIEW_SSH_HOST }}
          username: ${{ secrets.PREVIEW_SSH_USERNAME }}
          key: ${{ secrets.PREVIEW_SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            DEPLOY_DIR="${{ secrets.PREVIEW_DEPLOY_PATH }}/pr-${{ github.event.pull_request.number }}"
            COMPOSE_FILE="$DEPLOY_DIR/docker-compose.preview.yml"

            if [ -f "$COMPOSE_FILE" ]; then
              docker compose -p "preview-pr${{ github.event.pull_request.number }}" \
                -f "$COMPOSE_FILE" down -v --remove-orphans
            fi

            rm -rf "$DEPLOY_DIR"

      - name: Delete preview images from GHCR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"

          for image in django postgres; do
            VERSION_ID=$(gh api "/orgs/${OWNER}/packages/container/${REPO}%2F${image}/versions" \
              --jq ".[] | select(.metadata.container.tags[] == \"pr-${PR_NUMBER}\") | .id" \
              2>/dev/null | head -1)

            if [ -n "$VERSION_ID" ]; then
              gh api --method DELETE \
                "/orgs/${OWNER}/packages/container/${REPO}%2F${image}/versions/${VERSION_ID}"
              echo "Deleted ${image}:pr-${PR_NUMBER}"
            fi
          done

      - name: Comment teardown on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body "Preview \`${{ steps.slug.outputs.branch_slug }}.testing.instarchiver.net\` removed."
