name: Preview

# Enable Buildkit and let compose use it to speed up image building
env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

on:
  pull_request:
    branches: ["master"]
    paths-ignore: ["docs/**"]
    types: [opened, synchronize, reopened, closed]

jobs:
  # ──────────────────────────────────────────────
  # Run linter (mirrors CI)
  # ──────────────────────────────────────────────
  linter:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

  # ──────────────────────────────────────────────
  # Run tests (mirrors CI — no Codecov upload)
  # ──────────────────────────────────────────────
  pytest:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and cache local backend
        uses: docker/bake-action@v7
        with:
          push: false
          load: true
          files: docker-compose.local.yml
          targets: django
          set: |
            django.cache-from=type=gha,scope=django-cached-tests
            django.cache-to=type=gha,scope=django-cached-tests,mode=max

      - name: Check DB Migrations
        run: docker compose -f docker-compose.local.yml run --rm django python manage.py makemigrations --check

      - name: Run DB Migrations
        run: docker compose -f docker-compose.local.yml run --rm django python manage.py migrate

      - name: Run Django Tests
        run: docker compose -f docker-compose.local.yml run django pytest -n auto --cov --cov-branch --cov-report=xml

      - name: Tear down the Stack
        run: docker compose -f docker-compose.local.yml down

  # ──────────────────────────────────────────────
  # Build production images and push to GHCR
  # ──────────────────────────────────────────────
  build-and-push:
    needs: [linter, pytest]
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: django
            dockerfile: ./compose/local/django/Dockerfile
          - name: postgres
            dockerfile: ./compose/production/postgres/Dockerfile

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.name }}:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha,scope=${{ matrix.name }}-cached-preview
          cache-to: type=gha,scope=${{ matrix.name }}-cached-preview,mode=max

  # ──────────────────────────────────────────────
  # Deploy preview to VPS
  # ──────────────────────────────────────────────
  deploy:
    needs: [build-and-push]
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v6

      - name: Compute branch slug
        id: slug
        run: |
          BRANCH_SLUG=$(echo "${{ github.head_ref }}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9-]/-/g' \
            | sed 's/--*/-/g' \
            | sed 's/^-//; s/-$//' \
            | cut -c1-50)
          echo "branch_slug=$BRANCH_SLUG" >> "$GITHUB_OUTPUT"

      - name: Create deploy directory and write .env on VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PREVIEW_SSH_HOST }}
          username: ${{ secrets.PREVIEW_SSH_USERNAME }}
          password: ${{ secrets.PREVIEW_SSH_PASSWORD }}
          script_stop: true
          script: |
            set -euo pipefail
            mkdir -p "${{ secrets.PREVIEW_DEPLOY_PATH }}/pr-${{ github.event.pull_request.number }}"

            cat > "${{ secrets.PREVIEW_DEPLOY_PATH }}/pr-${{ github.event.pull_request.number }}/.env" <<'EOF'
            # Path to shared base env files on this VPS (used in docker-compose env_file interpolation)
            SHARED_ENV_DIR=${{ secrets.PREVIEW_SHARED_ENV_DIR }}

            # Routing — used in docker-compose.preview.yml label interpolation
            PR_NUMBER=${{ github.event.pull_request.number }}
            BRANCH_SLUG=${{ steps.slug.outputs.branch_slug }}
            IMAGE_REPO=${{ github.repository }}
            EOF

      - name: Copy docker-compose.preview.yml to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.PREVIEW_SSH_HOST }}
          username: ${{ secrets.PREVIEW_SSH_USERNAME }}
          password: ${{ secrets.PREVIEW_SSH_PASSWORD }}
          source: "docker-compose.preview.yml"
          target: "${{ secrets.PREVIEW_DEPLOY_PATH }}/pr-${{ github.event.pull_request.number }}"
          overwrite: true

      - name: Start containers and run migrations
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PREVIEW_SSH_HOST }}
          username: ${{ secrets.PREVIEW_SSH_USERNAME }}
          password: ${{ secrets.PREVIEW_SSH_PASSWORD }}
          script_stop: true
          script: |
            set -euo pipefail

            COMPOSE_FILE="${{ secrets.PREVIEW_DEPLOY_PATH }}/pr-${{ github.event.pull_request.number }}/docker-compose.preview.yml"

            docker compose -p "preview-pr${{ github.event.pull_request.number }}" -f "$COMPOSE_FILE" \
              up -d --pull always --remove-orphans

            docker compose -p "preview-pr${{ github.event.pull_request.number }}" -f "$COMPOSE_FILE" \
              exec -T django python manage.py migrate --noinput

      - name: Comment preview URL on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body "**Preview deployed** → https://${{ steps.slug.outputs.branch_slug }}.preview.instarchiver.net

          Built from \`${{ github.event.pull_request.head.sha }}\`"

  # ──────────────────────────────────────────────
  # Tear down preview when PR is closed
  # ──────────────────────────────────────────────
  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      packages: write
      pull-requests: write

    steps:
      - name: Compute branch slug
        id: slug
        run: |
          BRANCH_SLUG=$(echo "${{ github.head_ref }}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9-]/-/g' \
            | sed 's/--*/-/g' \
            | sed 's/^-//; s/-$//' \
            | cut -c1-50)
          echo "branch_slug=$BRANCH_SLUG" >> "$GITHUB_OUTPUT"

      - name: Tear down containers and volumes
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PREVIEW_SSH_HOST }}
          username: ${{ secrets.PREVIEW_SSH_USERNAME }}
          password: ${{ secrets.PREVIEW_SSH_PASSWORD }}
          script: |
            set -euo pipefail

            DEPLOY_DIR="${{ secrets.PREVIEW_DEPLOY_PATH }}/pr-${{ github.event.pull_request.number }}"
            COMPOSE_FILE="$DEPLOY_DIR/docker-compose.preview.yml"

            if [ -f "$COMPOSE_FILE" ]; then
              docker compose -p "preview-pr${{ github.event.pull_request.number }}" \
                -f "$COMPOSE_FILE" down -v --remove-orphans
            fi

            rm -rf "$DEPLOY_DIR"

      - name: Delete preview images from GHCR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"

          for image in django postgres; do
            VERSION_ID=$(gh api "/orgs/${OWNER}/packages/container/${REPO}%2F${image}/versions" \
              --jq ".[] | select(.metadata.container.tags[] == \"pr-${PR_NUMBER}\") | .id" \
              2>/dev/null | head -1)

            if [ -n "$VERSION_ID" ]; then
              gh api --method DELETE \
                "/orgs/${OWNER}/packages/container/${REPO}%2F${image}/versions/${VERSION_ID}"
              echo "Deleted ${image}:pr-${PR_NUMBER}"
            fi
          done

      - name: Comment teardown on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body "Preview \`${{ steps.slug.outputs.branch_slug }}.preview.instarchiver.net\` removed."
